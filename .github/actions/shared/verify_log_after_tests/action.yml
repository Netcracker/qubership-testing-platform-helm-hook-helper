name: 'Verify Installation Action'
description: 'A GitHub Action to verify Kubernetes deployments including status checks, log collection, and test validation.'
inputs:
  namespace:
    description: |
      Kubernetes namespace for service installation
    required: true

  artifact_name:
    required: true

runs:
  using: 'composite'
  steps:
    - name: Get logs from all containers in pods
      shell: bash
      # language=bash
      run: |
        # ▶️ Get logs from all containers in pods
        echo "Artifact is ${{ inputs.artifact_name }}"
        echo "Artifact is ${{inputs.artifact_name}}"
        file_name=artifacts/${{inputs.namespace}}_log_from_containers_after_tests.txt
        IFS=' ' read -ra pods <<< $(kubectl get pods --no-headers -o custom-columns=":metadata.name" -n ${{inputs.namespace}} | tr $'\n' ' ')
        echo "Logs from all containers in pods: " > $file_name
        for pod in "${pods[@]}"; do
            IFS=' ' read -ra containers <<< $(kubectl get pod "$pod" -o jsonpath="{.spec.containers[*].name}")
            for container in "${containers[@]}"; do
              echo $pod $container >> $file_name
              kubectl logs "$pod" -c "$container" >> $file_name
              echo '================================================================================' >> $file_name

              restart_count=$(kubectl get pod "$pod" -o jsonpath="{.status.containerStatuses[?(@.name=='$container')].restartCount}")
              if [[ "$restart_count" -gt 0 ]]; then
                echo "🔁 Previous logs (before restart) for pod: $pod" >> $file_name
                echo "----- FULL PREVIOUS LOGS -----" >> $file_name
                if ! kubectl logs "$pod" --previous >> $file_name 2>&1; then
                  echo "⚠️ Could not fetch previous logs for $pod" >> $file_name
                fi
                echo "================================================================================" >> $file_name
              fi

              pod_status=$(kubectl get pod "$pod" -o jsonpath="{.status.phase}")
              service_log="/${{ inputs.namespace }}/console.log"
              if [[ "$pod_status" == "Running" ]]; then
                if kubectl exec "$pod" -c "$container" -- test -f "$service_log"; then
                  echo "Service log path: $service_log"  >> $file_name
                  local_file="artifacts/${{inputs.namespace}}_console_log_${pod}_${container}.txt"
                  echo "📥 Copying console.log from $pod/$container" >> $file_name
                  kubectl cp "$pod:$service_log" "$local_file" -c "$container"
                fi
              fi
            done
        done

    - name: Upload artifact
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: ${{inputs.artifact_name}}
        path: artifacts/
