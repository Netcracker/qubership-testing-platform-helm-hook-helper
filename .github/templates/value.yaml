configuration:
  brokerXmlOverride: |
    <broker xmlns="http://activemq.apache.org/schema/core"
            brokerName="localhost"
            dataDirectory="${activemq.data}">

      <plugins>
        <simpleAuthenticationPlugin anonymousAccessAllowed="true"/>

        <authorizationPlugin>
          <map>
            <authorizationMap>
              <authorizationEntries>
                <authorizationEntry queue=">" read="anonymous,admins" write="anonymous,admins" admin="anonymous,admins"/>
                <authorizationEntry topic=">" read="anonymous,admins" write="anonymous,admins" admin="anonymous,admins"/>
              </authorizationEntries>
            </authorizationMap>
          </map>
        </authorizationPlugin>

      </plugins>

    </broker>
